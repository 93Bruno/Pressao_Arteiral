<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Pressão Arterial</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="app-container">
    <header class="section-title">Bem-Vindo Bruno Sousa</header>

    <div class="container">

        <div class="logo-container">
            <div class="heart-icon-bg">
                <i data-lucide="heart-pulse" class="main-heart-icon"></i>
            </div>
            <span class="plus-decor decor-1">+</span>
            <span class="plus-decor decor-2">+</span>
            <span class="plus-decor decor-3">+</span>
        </div>

        <h1>Minha Pressão Arterial</h1>
        <p>Cuidar de você é a melhor escolha</p>

        <div id="mensagem">
            <i data-lucide="heart" class="info-heart-icon"></i>
            <span>Veja todos os registros clicando no botão Buscar</span>
        </div>

        <button id="btnBuscar">
            <i data-lucide="search"></i> Buscar Registros
        </button>

        <h2>Últimos Registros</h2>

        <div id="tabela-records"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
